<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Task Dashboard</title>
<link rel="icon" href="favicon.ico">
<script>
  // Apply saved theme before render to avoid a flash of the default theme.
  document.documentElement.setAttribute('data-theme', localStorage.getItem('dashboard-theme') || 'dark');
</script>
<script src="data/data-daily-news-briefing.js"></script>
<script src="data/data-ios-beta-weekly-check.js"></script>
<script src="data/data-buffalo-weekend-events.js"></script>
<script src="data/data-streaming-weekly-digest.js"></script>
<script src="data/data-daily-claude-news.js"></script>
<style>
  /* ---- Themes ---- */
  :root, [data-theme="dark"] {
    --bg: #0d1117; --text: #e6edf3; --heading: #f0f6fc; --muted: #8b949e;
    --card-bg: #161b22; --border: #30363d; --header-hover: #1c2230; --divider: #21262d;
    --chip-text: #58a6ff; --chip-bg: #1f3a5c; --chip-stale-text: #8b949e; --chip-stale-bg: #21262d;
    --faint: #484f58; --body-text: #c9d1d9; --link: #58a6ff;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  [data-theme="terminal"] {
    --bg: #0a0f0a; --text: #4ade80; --heading: #86efac; --muted: #3f8f5a;
    --card-bg: #0e160e; --border: #1e3a1e; --header-hover: #142414; --divider: #1e3a1e;
    --chip-text: #bbf7d0; --chip-bg: #16331b; --chip-stale-text: #3f8f5a; --chip-stale-bg: #142414;
    --faint: #2f6f3f; --body-text: #5ee892; --link: #86efac;
    --font: 'SF Mono', ui-monospace, Menlo, Monaco, 'Courier New', monospace;
  }
  [data-theme="light"] {
    --bg: #ffffff; --text: #1f2328; --heading: #1f2328; --muted: #656d76;
    --card-bg: #f6f8fa; --border: #d0d7de; --header-hover: #eef1f4; --divider: #d8dee4;
    --chip-text: #0969da; --chip-bg: #ddf4ff; --chip-stale-text: #656d76; --chip-stale-bg: #eaeef2;
    --faint: #8c959f; --body-text: #1f2328; --link: #0969da;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  [data-theme="synthwave"] {
    --bg: #1a0b2e; --text: #ffb3f0; --heading: #fe75fe; --muted: #7a5fb0;
    --card-bg: #241046; --border: #582a82; --header-hover: #2e1456; --divider: #582a82;
    --chip-text: #00f0ff; --chip-bg: #2a1a4a; --chip-stale-text: #7a5fb0; --chip-stale-bg: #241046;
    --faint: #6f4fa0; --body-text: #ffc4f3; --link: #00f0ff;
    --font: 'SF Mono', ui-monospace, Menlo, Monaco, 'Courier New', monospace;
  }
  [data-theme="dracula"] {
    --bg: #282a36; --text: #f8f8f2; --heading: #ff79c6; --muted: #6272a4;
    --card-bg: #343746; --border: #44475a; --header-hover: #3c3f51; --divider: #44475a;
    --chip-text: #8be9fd; --chip-bg: #20394a; --chip-stale-text: #6272a4; --chip-stale-bg: #343746;
    --faint: #6272a4; --body-text: #f8f8f2; --link: #bd93f9;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  [data-theme="nord"] {
    --bg: #2e3440; --text: #d8dee9; --heading: #eceff4; --muted: #7b88a1;
    --card-bg: #3b4252; --border: #434c5e; --header-hover: #434c5e; --divider: #4c566a;
    --chip-text: #88c0d0; --chip-bg: #2c3e44; --chip-stale-text: #7b88a1; --chip-stale-bg: #434c5e;
    --faint: #6c7689; --body-text: #e5e9f0; --link: #88c0d0;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  [data-theme="sakura"] {
    --bg: #fff5f7; --text: #5a2a3a; --heading: #b03060; --muted: #a96b80;
    --card-bg: #ffe9ef; --border: #f3c6d3; --header-hover: #ffdde6; --divider: #f3c6d3;
    --chip-text: #c2185b; --chip-bg: #ffd0e0; --chip-stale-text: #a96b80; --chip-stale-bg: #ffdde6;
    --faint: #cfa0b0; --body-text: #5a2a3a; --link: #c2185b;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; padding: 32px 24px; transition: background 0.15s, color 0.15s; }
  h1 { font-size: 28px; font-weight: 600; margin-bottom: 6px; color: var(--heading); }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 36px; }
  .grid { display: flex; flex-direction: column; gap: 24px; }
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .card-header { padding: 18px 20px; border-bottom: 1px solid transparent; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; cursor: pointer; user-select: none; -webkit-user-select: none; transition: background 0.12s; }
  .card-header:hover { background: var(--header-hover); }
  .card.expanded .card-header { border-bottom-color: var(--divider); padding-bottom: 14px; }
  .card-title { font-size: 16px; font-weight: 600; color: var(--heading); }
  .chevron { display: inline-block; width: 12px; color: var(--muted); margin-right: 8px; transition: transform 0.15s; font-size: 11px; }
  .card.expanded .chevron { transform: rotate(90deg); }
  .card-updated { text-align: right; flex-shrink: 0; }
  .updated-ago { font-size: 12px; color: var(--chip-text); background: var(--chip-bg); border-radius: 6px; padding: 3px 8px; white-space: nowrap; display: inline-block; }
  .updated-ago.stale { color: var(--chip-stale-text); background: var(--chip-stale-bg); }
  .updated-full { font-size: 11px; color: var(--faint); margin-top: 5px; white-space: nowrap; }
  .card-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .card-body { display: none; padding: 20px; font-size: 14px; line-height: 1.7; color: var(--body-text); white-space: pre-wrap; word-break: break-word; }
  .card.expanded .card-body { display: block; }
  .empty { color: var(--faint); font-style: italic; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .ctl { font-size: 12px; color: var(--muted); background: var(--chip-stale-bg); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; cursor: pointer; font-family: var(--font); }
  .ctl:hover { color: var(--heading); }
  select.ctl { -webkit-appearance: none; appearance: none; padding-right: 26px; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M1 3l4 4 4-4' fill='none' stroke='%238b949e' stroke-width='1.5'/></svg>"); background-repeat: no-repeat; background-position: right 9px center; }
</style>
</head>
<body>
<div class="header-row">
  <div>
    <h1>Claude Task Dashboard</h1>
  </div>
  <div class="controls">
    <select class="ctl" id="theme" aria-label="Theme">
      <option value="dark">🌙 Dark</option>
      <option value="terminal">🖥️ Terminal</option>
      <option value="light">☀️ Light</option>
      <option value="synthwave">🌆 Synthwave</option>
      <option value="dracula">🧛 Dracula</option>
      <option value="nord">❄️ Nord</option>
      <option value="sakura">🌸 Sakura</option>
    </select>
    <button class="ctl" onclick="location.reload()">↻ Refresh</button>
  </div>
</div>
<div class="grid" id="grid"></div>

<script>
// ---- Theme picker ----
const themeSelect = document.getElementById('theme');
themeSelect.value = document.documentElement.getAttribute('data-theme');
themeSelect.addEventListener('change', () => {
  document.documentElement.setAttribute('data-theme', themeSelect.value);
  localStorage.setItem('dashboard-theme', themeSelect.value);
});

const TASKS = [
  {
    id: 'daily-news-briefing',
    title: '🗞️ Daily News Briefing',
    schedule: '6:00 AM & 6:00 PM daily',
    description: 'Local Pendleton/Buffalo/WNY, US, and global headlines'
  },
  {
    id: 'ios-beta-weekly-check',
    title: '📱 iOS Beta Check',
    schedule: 'Every day at 4:00 AM',
    description: 'Go/no-go recommendation for iPhone 15 Pro Max'
  },
  {
    id: 'buffalo-weekend-events',
    title: '🎉 Buffalo Weekend Events',
    schedule: 'Every day at 5:00 AM',
    description: 'Free & paid events in and around Buffalo'
  },
  {
    id: 'streaming-weekly-digest',
    title: '📺 Streaming Digest',
    schedule: 'Every day at 2:00 AM',
    description: 'New on Apple TV+, Crunchyroll, and Prime Video'
  },
  {
    id: 'daily-claude-news',
    title: '🤖 Claude News',
    schedule: 'Every day at 1:00 AM',
    description: 'Latest Anthropic & Claude news from the past 24 hours'
  }
];

function formatContent(text) {
  return text.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
}

function timeAgo(iso) {
  if (!iso) return 'never';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

const grid = document.getElementById('grid');
const data = window.taskData || {};

TASKS.sort((a, b) => {
  const aTime = data[a.id]?.updatedAt ? new Date(data[a.id].updatedAt) : new Date(0);
  const bTime = data[b.id]?.updatedAt ? new Date(data[b.id].updatedAt) : new Date(0);
  return bTime - aTime;
});

TASKS.forEach(task => {
  const d = data[task.id];
  const hasContent = d && d.content;
  const isStale = !d || !d.updatedAt;
  const agoLabel = d && d.updatedAt ? `Updated ${timeAgo(d.updatedAt)}` : 'No data yet';
  const fullLabel = d && d.updatedAt ? new Date(d.updatedAt).toLocaleString() : 'waiting for first run';

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div>
        <div class="card-title"><span class="chevron">▶</span>${task.title}</div>
        <div class="card-meta">${task.description}</div>
      </div>
      <div class="card-updated">
        <div class="updated-ago ${isStale ? 'stale' : ''}">${agoLabel}</div>
        <div class="updated-full">${fullLabel}</div>
      </div>
    </div>
    <div class="card-body">
      ${hasContent ? formatContent(d.content) : '<span class="empty">No output yet — waiting for first run.</span>'}
    </div>
  `;
  card.querySelector('.card-header').addEventListener('click', () => {
    const wasExpanded = card.classList.contains('expanded');
    document.querySelectorAll('.card.expanded').forEach(c => c.classList.remove('expanded'));
    if (!wasExpanded) {
      card.classList.add('expanded');
      // Bring the top of the expanded card to the top of the viewport.
      requestAnimationFrame(() => {
        const top = card.getBoundingClientRect().top + window.pageYOffset - 16;
        window.scrollTo({ top, behavior: 'smooth' });
      });
    }
  });
  grid.appendChild(card);
});
</script>
</body>
</html>
