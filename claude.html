<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Task Dashboard</title>
<link rel="icon" href="favicon.ico">
<script src="data-daily-news-briefing.js"></script>
<script src="data-soundbar-price-alert.js"></script>
<script src="data-ios-beta-weekly-check.js"></script>
<script src="data-buffalo-weekend-events.js"></script>
<script src="data-streaming-weekly-digest.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 32px 24px; }
  h1 { font-size: 28px; font-weight: 600; margin-bottom: 6px; color: #f0f6fc; }
  .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 36px; }
  .grid { display: flex; flex-direction: column; gap: 24px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }
  .card-header { padding: 18px 20px 14px; border-bottom: 1px solid #21262d; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .card-title { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  .card-schedule { font-size: 12px; color: #58a6ff; background: #1f3a5c; border-radius: 6px; padding: 3px 8px; white-space: nowrap; flex-shrink: 0; }
  .card-meta { font-size: 12px; color: #8b949e; margin-top: 4px; }
  .card-body { padding: 20px; font-size: 14px; line-height: 1.7; color: #c9d1d9; white-space: pre-wrap; word-break: break-word; }
  .empty { color: #484f58; font-style: italic; }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .last-updated { padding: 8px 20px 14px; color: #484f58; font-size: 11px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #238636; display: inline-block; margin-right: 6px; }
  .status-dot.stale { background: #484f58; }
  .reload-btn { font-size: 12px; color: #8b949e; background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 4px 10px; cursor: pointer; margin-left: 12px; }
  .reload-btn:hover { color: #f0f6fc; }
  .header-row { display: flex; align-items: center; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="header-row">
  <div>
    <h1>Claude Task Dashboard</h1>
    <div class="subtitle">Outputs from your scheduled Claude tasks — open this file in your browser</div>
  </div>
  <button class="reload-btn" onclick="location.reload()">↻ Refresh</button>
</div>
<div class="grid" id="grid"></div>

<script>
const TASKS = [
  {
    id: 'daily-news-briefing',
    title: '🗞️ Daily News Briefing',
    schedule: '6:00 AM & 6:00 PM daily',
    description: 'Local Pendleton/Buffalo/WNY, US, and global headlines'
  },
  {
    id: 'soundbar-price-alert',
    title: '🔊 Soundbar Price Alert',
    schedule: 'Every day at 12:00 AM',
    description: 'Samsung HW-Q600F — alert when ≤$300 incl. shipping'
  },
  {
    id: 'ios-beta-weekly-check',
    title: '📱 iOS Beta Weekly Check',
    schedule: 'Every Monday at 4:00 AM',
    description: 'Go/no-go recommendation for iPhone 15 Pro Max'
  },
  {
    id: 'buffalo-weekend-events',
    title: '🎉 Buffalo Weekend Events',
    schedule: 'Every Friday at 5:00 AM',
    description: 'Free & paid events in and around Buffalo'
  },
  {
    id: 'streaming-weekly-digest',
    title: '📺 Streaming Weekly Digest',
    schedule: 'Every Saturday at 7:00 AM',
    description: 'New on Apple TV+, Crunchyroll, and Prime Video'
  }
];

function formatContent(text) {
  return text.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
}

function timeAgo(iso) {
  if (!iso) return 'never';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

const grid = document.getElementById('grid');
const data = window.taskData || {};

TASKS.sort((a, b) => {
  const aTime = data[a.id]?.updatedAt ? new Date(data[a.id].updatedAt) : new Date(0);
  const bTime = data[b.id]?.updatedAt ? new Date(data[b.id].updatedAt) : new Date(0);
  return bTime - aTime;
});

TASKS.forEach(task => {
  const d = data[task.id];
  const hasContent = d && d.content;
  const isStale = !d || !d.updatedAt;
  const updatedStr = d && d.updatedAt
    ? `Last updated ${timeAgo(d.updatedAt)} — ${new Date(d.updatedAt).toLocaleString()}`
    : 'No data yet — waiting for first run';

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div>
        <div class="card-title"><span class="status-dot ${isStale ? 'stale' : ''}"></span>${task.title}</div>
        <div class="card-meta">${task.description}</div>
      </div>
      <div class="card-schedule">${task.schedule}</div>
    </div>
    <div class="card-body">
      ${hasContent ? formatContent(d.content) : '<span class="empty">No output yet — waiting for first run.</span>'}
    </div>
    <div class="last-updated">${updatedStr}</div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
