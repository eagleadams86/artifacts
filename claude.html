<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Task Dashboard</title>
<link rel="icon" href="favicon.ico">
<script src="data/data-daily-news-briefing.js"></script>
<script src="data/data-soundbar-price-alert.js"></script>
<script src="data/data-ios-beta-weekly-check.js"></script>
<script src="data/data-buffalo-weekend-events.js"></script>
<script src="data/data-streaming-weekly-digest.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 32px 24px; }
  h1 { font-size: 28px; font-weight: 600; margin-bottom: 6px; color: #f0f6fc; }
  .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 36px; }
  .grid { display: flex; flex-direction: column; gap: 24px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }
  .card-header { padding: 18px 20px; border-bottom: 1px solid transparent; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; cursor: pointer; user-select: none; -webkit-user-select: none; transition: background 0.12s; }
  .card-header:hover { background: #1c2230; }
  .card.expanded .card-header { border-bottom-color: #21262d; padding-bottom: 14px; }
  .card-title { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  .chevron { display: inline-block; width: 12px; color: #8b949e; margin-right: 8px; transition: transform 0.15s; font-size: 11px; }
  .card.expanded .chevron { transform: rotate(90deg); }
  .card-updated { text-align: right; flex-shrink: 0; }
  .updated-ago { font-size: 12px; color: #58a6ff; background: #1f3a5c; border-radius: 6px; padding: 3px 8px; white-space: nowrap; display: inline-block; }
  .updated-ago.stale { color: #8b949e; background: #21262d; }
  .updated-full { font-size: 11px; color: #484f58; margin-top: 5px; white-space: nowrap; }
  .card-meta { font-size: 12px; color: #8b949e; margin-top: 4px; }
  .card-body { display: none; padding: 20px; font-size: 14px; line-height: 1.7; color: #c9d1d9; white-space: pre-wrap; word-break: break-word; }
  .card.expanded .card-body { display: block; }
  .empty { color: #484f58; font-style: italic; }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .reload-btn { font-size: 12px; color: #8b949e; background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 4px 10px; cursor: pointer; margin-left: 12px; }
  .reload-btn:hover { color: #f0f6fc; }
  .header-row { display: flex; align-items: center; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="header-row">
  <div>
    <h1>Claude Task Dashboard</h1>
  </div>
  <button class="reload-btn" onclick="location.reload()">↻ Refresh</button>
</div>
<div class="grid" id="grid"></div>

<script>
const TASKS = [
  {
    id: 'daily-news-briefing',
    title: '🗞️ Daily News Briefing',
    schedule: '6:00 AM & 6:00 PM daily',
    description: 'Local Pendleton/Buffalo/WNY, US, and global headlines'
  },
  {
    id: 'soundbar-price-alert',
    title: '🔊 Soundbar Price Alert',
    schedule: 'Every day at 12:00 AM',
    description: 'Samsung HW-Q600F — alert when ≤$300 incl. shipping'
  },
  {
    id: 'ios-beta-weekly-check',
    title: '📱 iOS Beta Weekly Check',
    schedule: 'Every Monday at 4:00 AM',
    description: 'Go/no-go recommendation for iPhone 15 Pro Max'
  },
  {
    id: 'buffalo-weekend-events',
    title: '🎉 Buffalo Weekend Events',
    schedule: 'Every Friday at 5:00 AM',
    description: 'Free & paid events in and around Buffalo'
  },
  {
    id: 'streaming-weekly-digest',
    title: '📺 Streaming Weekly Digest',
    schedule: 'Every Saturday at 7:00 AM',
    description: 'New on Apple TV+, Crunchyroll, and Prime Video'
  }
];

function formatContent(text) {
  return text.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
}

function timeAgo(iso) {
  if (!iso) return 'never';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

const grid = document.getElementById('grid');
const data = window.taskData || {};

TASKS.sort((a, b) => {
  const aTime = data[a.id]?.updatedAt ? new Date(data[a.id].updatedAt) : new Date(0);
  const bTime = data[b.id]?.updatedAt ? new Date(data[b.id].updatedAt) : new Date(0);
  return bTime - aTime;
});

TASKS.forEach(task => {
  const d = data[task.id];
  const hasContent = d && d.content;
  const isStale = !d || !d.updatedAt;
  const agoLabel = d && d.updatedAt ? `Updated ${timeAgo(d.updatedAt)}` : 'No data yet';
  const fullLabel = d && d.updatedAt ? new Date(d.updatedAt).toLocaleString() : 'waiting for first run';

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div>
        <div class="card-title"><span class="chevron">▶</span>${task.title}</div>
        <div class="card-meta">${task.description}</div>
      </div>
      <div class="card-updated">
        <div class="updated-ago ${isStale ? 'stale' : ''}">${agoLabel}</div>
        <div class="updated-full">${fullLabel}</div>
      </div>
    </div>
    <div class="card-body">
      ${hasContent ? formatContent(d.content) : '<span class="empty">No output yet — waiting for first run.</span>'}
    </div>
  `;
  card.querySelector('.card-header').addEventListener('click', () => {
    const wasExpanded = card.classList.contains('expanded');
    document.querySelectorAll('.card.expanded').forEach(c => c.classList.remove('expanded'));
    if (!wasExpanded) card.classList.add('expanded');
  });
  grid.appendChild(card);
});
</script>
</body>
</html>
